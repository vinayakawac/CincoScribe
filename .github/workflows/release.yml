name: Build & Deploy Release

on:
  push:
    tags:
      - 'v*'
  release:
    types: [published]

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: windows-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Build & Publish Release Artifacts
        run: npx electron-builder --project packages/desktop --publish always
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
